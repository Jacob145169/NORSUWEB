{% load static %}
<nav class="navbar navbar-expand-lg site-navbar site-navbar--glass" data-bs-theme="dark" id="siteNavbar">
    <div class="container site-navbar-shell">
        <a class="navbar-brand site-brand" href="{% url 'core:home' %}">
            <img
                src="{% static 'images/branding/site-logo.png' %}?v=20260402-logo"
                alt="NORSU logo"
                class="site-brand-logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';"
            >
            <span class="site-brand-mark site-brand-mark-fallback">NORSU</span>
            <span class="site-brand-copy">
                <span class="site-brand-title">Negros Oriental State University</span>
                <span class="site-brand-subtitle">Bayawan Sta. Catalina Campus</span>
            </span>
        </a>
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            {% include "includes/site_nav_items.html" with nav_prefix="siteNav" %}
        </div>
    </div>
</nav>
