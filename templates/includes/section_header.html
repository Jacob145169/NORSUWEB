<div class="section-heading {{ extra_classes|default:'' }}">
    <p class="section-eyebrow">{{ eyebrow }}</p>
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3">
        <div>
            <h2 class="section-title mb-0">{{ title }}</h2>
            {% if description %}
                <p class="section-description mb-0 mt-2">{{ description }}</p>
            {% endif %}
        </div>
        {% if action_label and action_href %}
            <a href="{{ action_href }}" class="btn btn-outline-primary">{{ action_label }}</a>
        {% endif %}
    </div>
</div>
