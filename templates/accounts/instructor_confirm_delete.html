{% extends "accounts/dashboard_base.html" %}

{% block dashboard_content %}
<section class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="info-card">
            <p class="section-eyebrow">Instructor Management</p>
            <h1 class="section-title mb-3">{{ page_title }}</h1>
            <p class="text-secondary mb-4">
                {{ page_description }} This cannot be undone from this page.
            </p>

            <div class="dashboard-panel mb-4">
                <h2 class="h5 mb-2">{{ object.full_name }}</h2>
                <p class="mb-0 text-secondary">{{ object.department.name }}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex flex-column flex-sm-row gap-3">
                    <button type="submit" class="btn btn-danger px-4">Delete Instructor</button>
                    <a href="{% url 'accounts:instructor_list' %}" class="btn btn-outline-primary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
